version: 2

before:
  hooks:
    - rm -rf dist
    - go mod tidy
    - git diff --exit-code
    - git push
    - git push --tags

builds:
  - id: o2
    main: ./cmd/o2
    binary: o2
    ldflags:
      - -s -w
      - -X github.com/ondrejsikax/2026-05-31-o2-cli/version.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: o2
    ids:
      - o2
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"
